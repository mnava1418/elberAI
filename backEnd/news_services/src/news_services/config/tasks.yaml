tech_research_task:
  description: >
    Buscar y analizar las noticias más relevantes del día en tecnología.
    Enfocar en: IA, startups, gadgets, ciberseguridad y tech empresarial.
    Cobertura: Internacional.
    CRÍTICO: Aplicar ranking automático para seleccionar ÚNICAMENTE las TOP 3 noticias más relevantes.
    Considerar criterios: impacto en la industria, novedad, alcance mediático.
    IDIOMA OBLIGATORIO: Todo el contenido final debe ser en ESPAÑOL MEXICANO.
    TRADUCCIÓN AUTOMÁTICA: Si las fuentes están en inglés u otros idiomas, traducir automáticamente a español mexicano natural.
    Fecha actual: {current_date}
  expected_output: >
    JSON estructurado con exactamente 3 noticias de tecnología:
    {
      "category": "technology",
      "articles": [
        {
          "title": "título de la noticia",
          "summary": "resumen de 2-3 líneas",
          "source": "fuente original",
          "url": "enlace completo",
          "published_date": "fecha publicación",
          "relevance_score": 8.5,
          "category": "technology"
        }
      ],
      "total_articles_found": 25,
      "research_timestamp": "2024-03-06T10:30:00Z"
    }
  agent: tech_reporter

