fact_checking_task:
  description: >
    Recibir y validar las 9 noticias pre-seleccionadas (3 tech + 3 deportes + 3 geopolítica) de los reporteros.
    Responsabilidades críticas de verificación:
    1. VALIDACIÓN DE CONTENIDO: Verificar que cada resumen refleje correctamente el contenido de la fuente original
    2. VERIFICACIÓN DE FUENTES: Confirmar que las URLs sean funcionales y las fuentes sean confiables
    3. CONTROL DE CALIDAD: Detectar información incorrecta, desactualizada o malinterpretada
    4. DETECCIÓN DE SESGOS: Identificar y señalar contenido tendencioso, sensacionalista o clickbait
    5. VALIDACIÓN DE FECHAS: Confirmar que las noticias sean realmente del día actual
    6. COHERENCIA CONTEXTUAL: Verificar que los títulos y resúmenes sean consistentes con el contenido real
    7. FILTRADO DE DUPLICADOS: Detectar noticias similares entre categorías
    8. CONTROL DE IDIOMA: Asegurar traducción completa y correcta al español mexicano
    
    CRITERIOS DE RECHAZO: Rechazar noticias que contengan:
    - Información no verificable o especulativa
    - Fuentes poco confiables o URLs rotas
    - Contenido sensacionalista o títulos engañosos
    - Información desactualizada o incorrecta
    - Sesgos políticos o ideológicos evidentes
    
    PROCESO: Analizar cada una de las 9 noticias y generar un reporte de validación con
    recomendaciones de aprobación, modificación o rechazo para cada una.
  expected_output: >
    JSON estructurado con validación completa de las 9 noticias:
    {
      "validation_report": {
        "tech_articles": [
          {
            "original_title": "título original",
            "validation_status": "approved/needs_revision/rejected",
            "accuracy_score": 9.2,
            "source_reliability": "high/medium/low",
            "content_quality": "factual/speculative/misleading",
            "fact_check_notes": "observaciones específicas",
            "recommended_changes": "modificaciones sugeridas si aplica",
            "validated_article": {
              "title": "título de la noticia validada",
              "summary": "resumen validado",
              "source": "fuente original",
              "url": "enlace completo",
              "published_date": "fecha publicación",
              "relevance_score": 8.5,
              "category": "technology"
            }
          }
        ],
        "sports_articles": [
          {
            "original_title": "título original",
            "validation_status": "approved/needs_revision/rejected",
            "accuracy_score": 9.2,
            "source_reliability": "high/medium/low",
            "content_quality": "factual/speculative/misleading",
            "fact_check_notes": "observaciones específicas",
            "recommended_changes": "modificaciones sugeridas si aplica",
            "validated_article": {
              "title": "título de la noticia validada",
              "summary": "resumen validado",
              "source": "fuente original",
              "url": "enlace completo",
              "published_date": "fecha publicación",
              "relevance_score": 8.5,
              "category": "sports"
            }
          }
        ],
        "geopolitics_articles": [
          {
            "original_title": "título original",
            "validation_status": "approved/needs_revision/rejected",
            "accuracy_score": 9.2,
            "source_reliability": "high/medium/low",
            "content_quality": "factual/speculative/misleading",
            "fact_check_notes": "observaciones específicas",
            "recommended_changes": "modificaciones sugeridas si aplica",
            "validated_article": {
              "title": "título de la noticia validada",
              "summary": "resumen validado",
              "source": "fuente original",
              "url": "enlace completo",
              "published_date": "fecha publicación",
              "relevance_score": 8.5,
              "category": "geopolitics"
            }
          }
        ],
        "overall_assessment": {
          "total_articles_validated": 9,
          "approved_count": 7,
          "needs_revision_count": 2,
          "rejected_count": 0,
          "quality_score": 8.5,
          "validation_timestamp": "{current_date}"
        }
      }
    }
  agent: fact_checker
  context: [tech_research_task, sports_research_task, geopolitics_research_task]

editorial_curation_task:
  description: >
    Recibir el reporte de validación del fact-checker y las noticias verificadas para curaduría final.
    
    RESTRICCIÓN CRÍTICA: SOLO procesar noticias con validation_status="approved" del fact-checker.
    PROHIBIDO: Usar cualquier noticia marcada como "needs_revision" o "rejected".
    
    Responsabilidades críticas:
    1. Revisar reporte de validación y aplicar recomendaciones del fact-checker
    2. FILTRAR EXCLUSIVAMENTE noticias con status "approved" del validation_report
    3. Agregación ÚNICAMENTE de noticias aprobadas por el fact-checker
    4. Deduplicación inteligente basada en similaridad semántica (SOLO entre aprobadas)
    5. Verificar que no haya overlap entre categorías tech, deportes y geopolítica
    6. Re-ranking final si hay conflictos de relevancia (SOLO entre aprobadas)
    7. RECHAZAR COMPLETAMENTE cualquier noticia no aprobada por fact-checker
    8. Estructurar para el Copy Editor manteniendo SOLO noticias validadas y aprobadas
    
    VALIDACIÓN OBLIGATORIA: Antes de procesar, confirmar que todas las noticias 
    seleccionadas tengan validation_status="approved" en el fact_checking_task.
    
    Asegurar coherencia editorial, balance entre secciones y neutralidad informativa.
    NOTA: El filtrado de calidad ya fue realizado por el fact-checker, enfocar en organización editorial.
  expected_output: >
    JSON curado con las noticias finales organizadas por sección:
    {
      "curated_newsletter": {
        "tech_section": [
          {noticias tech curadas con metadatos editoriales}
        ],
        "sports_section": [  
          {noticias deportes curadas con metadatos editoriales}
        ],
        "geopolitics_section": [
          {noticias geopolítica curadas con metadatos editoriales}
        ],
        "editorial_notes": "notas del editor sobre decisiones tomadas",
        "total_articles": "número total de artículos seleccionados"
      }
    }
  agent: editor_in_chief
  context: [fact_checking_task]

newsletter_creation_task:
  description: >
    Convertir ÚNICAMENTE las noticias aprobadas por el fact_checker en un newsletter HTML profesional, responsive y con FORMATO CONSISTENTE.
    
    RESTRICCIÓN CRÍTICA: SOLO usar noticias que tengan validation_status="approved" del fact_checking_task.
    PROHIBIDO: Incluir cualquier noticia que no haya sido explícitamente aprobada por el fact_checker.
    
    VALIDACIÓN PREVIA OBLIGATORIA: Antes de crear el newsletter, verificar que todas las noticias 
    a incluir provengan del conjunto de noticias aprobadas en el fact_checking_task.
    
    ESTRUCTURA ESPECÍFICA REQUERIDA (MISMO FORMATO SIEMPRE):
    1. ENCABEZADO: Fecha del día prominente y diseño de marca consistente
    2. SALUDO PERSONALIZADO: Dirigido al destinatario con resumen ejecutivo de lo más relevante del día
    3. SECCIÓN TECNOLOGÍA: Exactamente 3 noticias con formato estandarizado:
       - Encabezado de la noticia (título atractivo)
       - Cuerpo de la noticia (resumen y contexto)
       - Liga a la fuente original (claramente identificada)
    4. SECCIÓN DEPORTES: Exactamente 3 noticias (fútbol europeo, tenis, F1) con formato idéntico:
       - Encabezado de la noticia (título atractivo)
       - Cuerpo de la noticia (resumen y contexto)
       - Liga a la fuente original (claramente identificada)
    5. SECCIÓN GEOPOLÍTICA: Exactamente 3 noticias (relaciones internacionales, conflictos, diplomacia) con formato idéntico:
       - Encabezado de la noticia (título atractivo)
       - Cuerpo de la noticia (resumen y contexto)
       - Liga a la fuente original (claramente identificada)
    6. FOOTER CONSISTENTE: Información de contacto especificando que Elber envió el newsletter
    
    CONSISTENCIA VISUAL CRÍTICA:
    - Mantener EXACTAMENTE los mismos colores, tipografías y espaciados
    - Estructura HTML idéntica en cada envío
    - Mismo layout responsive para móvil/desktop
    - Elementos gráficos y divisores consistentes entre secciones
    
    IDIOMA FINAL OBLIGATORIO: TODO el newsletter debe estar en ESPAÑOL MEXICANO.
    PROHIBIDO usar inglés, incluir texto en otros idiomas o dejar contenido sin traducir.
    
    TONE OF VOICE: Amigo cagado con humor mexicano (sin ser ñero).
    Eres ingenioso, bromista y sarcástico. Usa expresiones mexicanas divertidas,
    albures sutiles, referencias pop culturales mexicanas y sarcasmo inteligente.
    Haz que leer las noticias sea entretenido como platicar con tu compa más chistoso.
    Ejemplos de tono: "No manches, la IA ahora hace esto...", "Órale pues, resulta que...",
    "Como diría mi abuela: tal para cual", "¿A poco sí? Pues resulta que...".
    
    CONTROL DE CALIDAD: Revisar que no haya palabras en inglés ni texto sin traducir.
    
    Integrar links originales y metadatos de fuente.
    Asegurar compatibilidad con clientes de email.
  expected_output: >
    Newsletter completo en formato HTML responsive CON DISEÑO CONSISTENTE:
    - HTML válido y optimizado para email clients
    - CSS inline para compatibilidad máxima (móvil/desktop)
    - ESTRUCTURA FIJA: Encabezado → Saludo+Resumen → Sección Tech → Sección Deportes → Sección Geopolítica → Footer
    - Cada noticia con formato estándar: [Encabezado] + [Cuerpo] + [Liga fuente]
    - Links funcionales a fuentes originales claramente identificados
    - CONSISTENCIA VISUAL: Mismos colores, tipografías, espaciados y layout en cada envío
    - Footer estándar con información de contacto mencionando a Elber
    - Diseño profesional y legible garantizado en móvil/desktop
  agent: copy_editor
  context: [editorial_curation_task, fact_checking_task]

email_distribution_task:
  description: >
    Enviar el newsletter HTML al email específico: {recipient_email}
    Pasos requeridos:
    1. Validar que el HTML del newsletter esté completo
    2. Configurar asunto: "Elber News - {current_date}"    
    3. Enviar usando servicio de email configurado
    4. Reportar resultado del envío
    
    En caso de error, capturar detalles específicos para debugging.
  expected_output: >
    Reporte de distribución en formato JSON:
    {
      "status": "success",
      "recipient_email": "{recipient_email}",
      "send_date": "2024-03-06T10:30:00Z",
      "successful_send": true,
      "delivery_status": "delivered",
      "error_details": null,
      "email_subject": true,      
    }
  agent: mailer_agent
  context: [newsletter_creation_task]